<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Israel TD - Prototype</title>
    <link rel="stylesheet" href="./src/style.css" />
    <script type="importmap">
      {
        "imports": {
          "phaser": "https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.esm.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <header class="hud">
        <div class="hud__left">
          <div class="hud__title">Israel TD</div>
          <div class="resource-bars" aria-label="Resource status">
            <div class="resource-row">
              <div class="resource">
                <div class="resource__meta">
                  <span class="resource__name">Money</span>
                  <span id="resource-money-value" class="resource__value">120 / 1000</span>
                </div>
                <div class="resource__bar"><div id="resource-money-fill" class="resource__fill resource__fill--money"></div></div>
              </div>
              <div class="resource">
                <div class="resource__meta">
                  <span class="resource__name">Morale</span>
                  <span id="resource-morale-value" class="resource__value">100%</span>
                </div>
                <div class="resource__bar"><div id="resource-morale-fill" class="resource__fill resource__fill--morale"></div></div>
              </div>
            </div>
            <div class="resource-row">
              <div class="resource">
                <div class="resource__meta">
                  <span class="resource__name">Population</span>
                  <span id="resource-population-value" class="resource__value">100%</span>
                </div>
                <div class="resource__bar">
                  <div id="resource-population-fill" class="resource__fill resource__fill--population"></div>
                </div>
              </div>
              <div class="resource">
                <div class="resource__meta">
                  <span class="resource__name">Army</span>
                  <span id="resource-army-value" class="resource__value">100%</span>
                </div>
                <div class="resource__bar"><div id="resource-army-fill" class="resource__fill resource__fill--army"></div></div>
              </div>
            </div>
            <div class="resource-row">
              <div class="resource resource--wide">
                <div class="resource__meta">
                  <span class="resource__name">Economy</span>
                  <span id="resource-economy-value" class="resource__value">100%</span>
                </div>
                <div class="resource__bar">
                  <div id="resource-economy-fill" class="resource__fill resource__fill--economy"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="hud__wave" aria-live="polite">
          <span id="wave-indicator">Wave 0</span>
          <span id="wave-timer">Next wave: 60s</span>
          <span id="wave-origin">Next source: Gaza Strip</span>
        </div>
      </header>
      <main id="game-root" aria-label="Game canvas"></main>
      <button id="debug-toggle" class="debug-toggle" type="button" aria-expanded="false">Debug</button>
      <section id="debug-panel" class="debug-panel" hidden>
        <div class="debug-panel__title">Debug Menu</div>
        <button id="debug-launch-wave" class="debug-panel__action" type="button">Launch wave now</button>
        <div id="debug-status" class="debug-panel__status">Ready.</div>
      </section>
      <footer class="shop">
        <div class="shop__head">
          <span class="shop__title">Purchase Menu</span>
          <span id="shop-money" class="shop__money">Money: 120</span>
        </div>
        <div id="shop-tabs" class="shop__tabs" role="tablist" aria-label="Tower categories"></div>
        <div id="shop-items" class="shop__items" aria-live="polite"></div>
        <div id="shop-status" class="shop__status">Waiting for shop data...</div>
      </footer>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
