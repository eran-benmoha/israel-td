<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Israel TD - Prototype</title>
    <link rel="stylesheet" href="./src/style.css" />
    <script type="importmap">
      {
        "imports": {
          "phaser": "https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.esm.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <header class="hud">
        <div class="hud__left">
          <div class="hud__title">Israel TD</div>
          <div class="resource-icons" aria-label="Resource status">
            <span id="resource-money-value" class="resource-chip">💰 120</span>
            <span id="resource-morale-value" class="resource-chip">🙂 100%</span>
            <span id="resource-population-value" class="resource-chip">🩺 100%</span>
            <span id="resource-army-value" class="resource-chip">🪖 100%</span>
            <span id="resource-economy-value" class="resource-chip">📈 100%</span>
          </div>
        </div>
        <div class="hud__wave" aria-live="polite">
          <span id="wave-indicator">Wave 0</span>
          <span id="wave-timer">Clock: Jan 2022</span>
          <span id="wave-origin">Next source: Gaza Strip</span>
          <div class="wave-progress">
            <div class="wave-progress__bar" id="wave-progress-bar"></div>
            <span class="wave-progress__label" id="wave-progress-label"></span>
          </div>
        </div>
      </header>
      <main id="game-root" aria-label="Game canvas"></main>
      <button id="debug-toggle" class="debug-toggle" type="button" aria-expanded="false">🛠️</button>
      <section id="debug-panel" class="debug-panel" hidden>
        <div class="debug-panel__title">🛠️ Debug</div>
        <button id="debug-launch-wave" class="debug-panel__action" type="button">🚀 Launch Wave</button>
        <div id="debug-zoom" class="debug-panel__status">🔎 1.00x</div>
        <div id="debug-status" class="debug-panel__status">✅ Ready.</div>
      </section>
      <footer class="shop">
        <div class="shop__head">
          <span class="shop__title">🛒 Shop</span>
          <div class="shop__head-right">
            <span id="shop-money" class="shop__money">💰 120</span>
            <button id="shop-toggle" class="shop__toggle" type="button" aria-expanded="true">🙈</button>
          </div>
        </div>
        <div id="shop-tabs" class="shop__tabs shop__toggleable" role="tablist" aria-label="Tower categories"></div>
        <div id="shop-items" class="shop__items shop__toggleable" aria-live="polite"></div>
        <div id="shop-status" class="shop__status shop__toggleable">Waiting for shop data...</div>
      </footer>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
