<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Israel TD - Prototype</title>
    <link rel="stylesheet" href="./src/style.css" />
    <script type="importmap">
      {
        "imports": {
          "phaser": "https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.esm.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <header class="hud">
        <div class="hud__left">
          <div class="hud__title">Israel TD</div>
          <div class="hud__stats">
            <span>HP: 20</span>
            <span>Credits: 120</span>
          </div>
        </div>
        <div class="hud__wave" aria-live="polite">
          <span id="wave-indicator">Wave 0</span>
          <span id="wave-timer">Next wave: 60s</span>
        </div>
      </header>
      <main id="game-root" aria-label="Game canvas"></main>
      <button id="debug-toggle" class="debug-toggle" type="button" aria-expanded="false">Debug</button>
      <section id="debug-panel" class="debug-panel" hidden>
        <div class="debug-panel__title">Debug Menu</div>
        <button id="debug-launch-wave" class="debug-panel__action" type="button">Launch wave now</button>
        <div id="debug-status" class="debug-panel__status">Ready.</div>
      </section>
      <footer class="hud hud--bottom">
        <button class="hud__button" type="button" disabled>Tower A</button>
        <button class="hud__button" type="button" disabled>Tower B</button>
        <button class="hud__button" type="button" disabled>Start Wave</button>
      </footer>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
